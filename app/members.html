<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispensary — Members</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Dispensary <span>MS</span></div>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Members</div>
      <div class="page-sub">Students, Faculty and Staff registered in the dispensary</div>
    </div>
    <button class="btn btn-primary" id="btn-add" onclick="openAdd()" style="display:none">+ Add Member</button>
  </div>

  <div class="toolbar">
    <input class="search-input" type="text" id="search" placeholder="Search by name, roll number…" oninput="filterTable()">
    <select id="filter-type" onchange="filterTable()" style="max-width:160px">
      <option value="">All Types</option>
      <option value="Student">Student</option>
      <option value="Faculty">Faculty</option>
      <option value="Staff">Staff</option>
    </select>
    <select id="filter-status" onchange="filterTable()" style="max-width:140px">
      <option value="">All Status</option>
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>
  </div>

  <div class="table-wrap">
    <div id="members-table"><div class="spinner">Loading…</div></div>
  </div>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="member-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add Member</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="f-name">
      </div>
      <div class="form-group">
        <label>Age *</label>
        <input type="number" id="f-age" min="16">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="f-email">
      </div>
      <div class="form-group">
        <label>Contact Number *</label>
        <input type="text" id="f-contact">
      </div>
      <div class="form-group">
        <label>Roll / Employee Code</label>
        <input type="text" id="f-roll">
      </div>
      <div class="form-group">
        <label>Department</label>
        <input type="text" id="f-dept">
      </div>
      <div class="form-group">
        <label>Blood Group *</label>
        <select id="f-blood">
          <option value="">Select</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option>
          <option>O+</option><option>O-</option>
        </select>
      </div>
      <div class="form-group">
        <label>Emergency Contact *</label>
        <input type="text" id="f-emergency">
      </div>
      <div class="form-group">
        <label>Member Type *</label>
        <select id="f-type">
          <option value="">Select</option>
          <option>Student</option>
          <option>Faculty</option>
          <option>Staff</option>
        </select>
      </div>
      <div class="form-group">
        <label>Registration Date *</label>
        <input type="date" id="f-regdate">
      </div>
      <div class="form-group full">
        <label>Address</label>
        <input type="text" id="f-address">
      </div>
      <div class="form-group" id="status-group">
        <label>Status</label>
        <select id="f-status">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('member-modal')">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveMember()">Save</button>
    </div>
  </div>
</div>

<!-- Delete confirm -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-title">Delete Member</div>
    <p style="color:var(--text2); font-size:0.9rem">
      Are you sure you want to delete <strong id="del-name"></strong>?
      Their login will be deactivated and kept for audit.
    </p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (!requireAuth()) throw '';
  renderNav('members');

  let allMembers = [];
  let editingID  = null;
  let deletingID = null;

  // Show Add button only for admins
  if (isAdmin()) document.getElementById('btn-add').style.display = 'flex';

  async function loadMembers() {
    try {
      const data = await api.get('/members');
      allMembers = data.data || [];
      renderTable(allMembers);
    } catch (err) {
      document.getElementById('members-table').innerHTML =
        `<p class="empty">Error loading members: ${err.message}</p>`;
    }
  }

  function statusBadge(s) {
    return s === 'Active'
      ? '<span class="badge badge-green">Active</span>'
      : '<span class="badge badge-gray">Inactive</span>';
  }

  function typeBadge(t) {
    const map = { Student: 'blue', Faculty: 'warn', Staff: 'gray' };
    return `<span class="badge badge-${map[t] || 'gray'}">${t}</span>`;
  }

  function renderTable(rows) {
    const cols = [
      { key: 'MemberID',               label: 'ID' },
      { key: 'Name',                   label: 'Name' },
      { key: 'RollNumberOrEmployeeCode', label: 'Roll / Code' },
      { key: 'Department',             label: 'Department' },
      { key: 'BloodGroup',             label: 'Blood' },
      { key: 'MemberType',             label: 'Type' },
      { key: 'Status',                 label: 'Status' },
    ];

    buildTable('members-table', cols, rows, row => {
      const type   = typeBadge(row.MemberType);
      const status = statusBadge(row.Status);

      // Inject badge HTML directly — override the plain cell
      setTimeout(() => {
        document.querySelectorAll('#members-table tbody tr').forEach((tr, i) => {
          tr.cells[5].innerHTML = typeBadge(rows[i].MemberType);
          tr.cells[6].innerHTML = statusBadge(rows[i].Status);
        });
      }, 0);

      let btns = `<button class="btn btn-ghost btn-sm" onclick="openEdit(${row.MemberID})">Edit</button>`;
      if (isAdmin()) {
        btns += ` <button class="btn btn-danger btn-sm" onclick="openDelete(${row.MemberID}, '${row.Name.replace(/'/g,"\\'")}')">Delete</button>`;
      }
      return btns;
    });
  }

  function filterTable() {
    const q      = document.getElementById('search').value.toLowerCase();
    const type   = document.getElementById('filter-type').value;
    const status = document.getElementById('filter-status').value;

    const filtered = allMembers.filter(m => {
      const matchQ = !q ||
        m.Name?.toLowerCase().includes(q) ||
        m.RollNumberOrEmployeeCode?.toLowerCase().includes(q) ||
        m.Department?.toLowerCase().includes(q);
      const matchType   = !type   || m.MemberType === type;
      const matchStatus = !status || m.Status === status;
      return matchQ && matchType && matchStatus;
    });
    renderTable(filtered);
  }

  function openAdd() {
    editingID = null;
    document.getElementById('modal-title').textContent = 'Add Member';
    document.getElementById('modal-save-btn').textContent = 'Add Member';
    ['f-name','f-age','f-email','f-contact','f-roll','f-dept',
     'f-address'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-blood').value  = '';
    document.getElementById('f-type').value   = '';
    document.getElementById('f-status').value = 'Active';
    document.getElementById('f-regdate').value = new Date().toISOString().split('T')[0];
    // Non-admin can't change status in add mode
    document.getElementById('status-group').style.display = isAdmin() ? 'flex' : 'none';
    openModal('member-modal');
  }

  async function openEdit(id) {
    editingID = id;
    document.getElementById('modal-title').textContent = 'Edit Member';
    document.getElementById('modal-save-btn').textContent = 'Save Changes';
    try {
      const data = await api.get(`/members/${id}`);
      const m    = data.data;
      document.getElementById('f-name').value      = m.Name || '';
      document.getElementById('f-age').value       = m.Age || '';
      document.getElementById('f-email').value     = m.Email || '';
      document.getElementById('f-contact').value   = m.ContactNumber || '';
      document.getElementById('f-roll').value      = m.RollNumberOrEmployeeCode || '';
      document.getElementById('f-dept').value      = m.Department || '';
      document.getElementById('f-blood').value     = m.BloodGroup || '';
      document.getElementById('f-emergency').value = m.EmergencyContact || '';
      document.getElementById('f-type').value      = m.MemberType || '';
      document.getElementById('f-status').value    = m.Status || 'Active';
      document.getElementById('f-regdate').value   = m.RegistrationDate?.split('T')[0] || '';
      document.getElementById('f-address').value   = m.Address || '';

      // Regular members can't change these
      const locked = !isAdmin();
      ['f-type','f-status','f-roll'].forEach(id => {
        document.getElementById(id).disabled = locked;
      });

      openModal('member-modal');
    } catch (err) {
      toast('Failed to load member: ' + err.message, 'error');
    }
  }

  async function saveMember() {
    const body = {
      Name:                    document.getElementById('f-name').value.trim(),
      Age:                     parseInt(document.getElementById('f-age').value),
      Email:                   document.getElementById('f-email').value.trim(),
      ContactNumber:           document.getElementById('f-contact').value.trim(),
      RollNumberOrEmployeeCode: document.getElementById('f-roll').value.trim(),
      Department:              document.getElementById('f-dept').value.trim(),
      BloodGroup:              document.getElementById('f-blood').value,
      EmergencyContact:        document.getElementById('f-emergency').value.trim(),
      MemberType:              document.getElementById('f-type').value,
      Status:                  document.getElementById('f-status').value,
      RegistrationDate:        document.getElementById('f-regdate').value,
      Address:                 document.getElementById('f-address').value.trim(),
    };

    if (!body.Name || !body.Email || !body.ContactNumber || !body.BloodGroup ||
        !body.EmergencyContact || !body.MemberType || !body.RegistrationDate)
      return toast('Please fill all required fields', 'warn');

    try {
      if (editingID) {
        await api.put(`/members/${editingID}`, body);
        toast('Member updated');
      } else {
        await api.post('/members', body);
        toast('Member added');
      }
      closeModal('member-modal');
      loadMembers();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function openDelete(id, name) {
    deletingID = id;
    document.getElementById('del-name').textContent = name;
    openModal('delete-modal');
  }

  async function confirmDelete() {
    try {
      await api.del(`/members/${deletingID}`);
      toast('Member deleted');
      closeModal('delete-modal');
      loadMembers();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  loadMembers();
</script>
</body>
</html>
