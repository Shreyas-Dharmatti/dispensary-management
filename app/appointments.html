<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispensary — Appointments</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Medicine item row inside prescription form */
    .med-item {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 80px 32px;
      gap: 8px;
      align-items: end;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .med-item:last-child { border-bottom: none; }
    .med-item label { font-size: 0.75rem; color: var(--text3); display: block; margin-bottom: 3px; }
    .med-item input, .med-item select { font-size: 0.82rem; padding: 6px 8px; }
    .btn-remove-med {
      background: transparent; border: 1px solid var(--border);
      color: var(--danger); border-radius: var(--radius);
      cursor: pointer; font-size: 1rem; width: 32px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .btn-remove-med:hover { background: rgba(224,92,92,0.1); }
    .med-items-wrap { max-height: 280px; overflow-y: auto; margin-bottom: 8px; }
    .add-med-btn { font-size: 0.82rem; margin-top: 6px; }

    /* ── Custom doctor picker ── */
    .doctor-picker { position: relative; }
    .doctor-search-wrap { position: relative; display: flex; align-items: center; }
    .doctor-search-wrap input { padding-left: 12px; }
    .doctor-search-wrap .search-icon {
      position: absolute; left: 11px;
      color: var(--text3); font-size: 0.85rem; pointer-events: none;
    }
    .doctor-list {
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg); max-height: 220px; overflow-y: auto; margin-top: 6px;
    }
    .doctor-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background 0.12s;
    }
    .doctor-list-item:last-child { border-bottom: none; }
    .doctor-list-item:hover { background: var(--bg3); }
    .doctor-list-item.selected { background: rgba(79,142,247,0.1); border-left: 2px solid var(--accent); }
    .doctor-list-empty { padding: 16px 14px; color: var(--text3); font-size: 0.85rem; text-align: center; }
    .dl-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: var(--accent);
    }
    .dl-name  { font-size: 0.875rem; font-weight: 500; }
    .dl-spec  { font-size: 0.75rem; color: var(--text2); margin-top: 1px; }
    .dl-avail { margin-left: auto; text-align: right; flex-shrink: 0; }
    .dl-days  { font-size: 0.72rem; color: var(--accent2); font-weight: 500; }
    .dl-time  { font-size: 0.7rem; color: var(--text3); margin-top: 1px; }

    /* ── Custom doctor picker ── */
    .doctor-picker { position: relative; }
    .doctor-search-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .doctor-search-wrap input {
      padding-left: 36px;
    }
    .doctor-search-wrap .search-icon {
      position: absolute; left: 11px;
      color: var(--text3); font-size: 0.85rem; pointer-events: none;
    }
    .doctor-list {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      max-height: 220px; overflow-y: auto;
      margin-top: 6px;
    }
    .doctor-list-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .doctor-list-item:last-child { border-bottom: none; }
    .doctor-list-item:hover { background: var(--bg3); }
    .doctor-list-item.selected {
      background: rgba(79,142,247,0.1);
      border-left: 2px solid var(--accent);
    }
    .doctor-list-empty {
      padding: 16px 14px; color: var(--text3);
      font-size: 0.85rem; text-align: center;
    }
    .dl-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: var(--accent);
    }
    .dl-name { font-size: 0.875rem; font-weight: 500; }
    .dl-spec { font-size: 0.75rem; color: var(--text2); margin-top: 1px; }
    .dl-avail { margin-left: auto; text-align: right; flex-shrink: 0; }
    .dl-days  { font-size: 0.72rem; color: var(--accent2); font-weight: 500; }
    .dl-time  { font-size: 0.7rem; color: var(--text3); margin-top: 1px; }

    /* Rx view modal */
    .rx-item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
                   gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border);
                   font-size: 0.85rem; }
    .rx-item-row:last-child { border-bottom: none; }
    .rx-item-row .lbl { font-size: 0.75rem; color: var(--text3); margin-bottom: 2px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Dispensary <span>MS</span></div>
  <div id="nav-links"></div>
  <div id="nav-user"></div>
</nav>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Appointments</div>
      <div class="page-sub">Scheduled, completed and cancelled appointments</div>
    </div>
    <button class="btn btn-primary" onclick="openBook()">+ Book Appointment</button>
  </div>

  <div class="toolbar">
    <input class="search-input" type="text" id="search" placeholder="Search member or doctor…" oninput="filterTable()">
    <select id="filter-status" onchange="filterTable()" style="max-width:160px">
      <option value="">All Status</option>
      <option value="Scheduled">Scheduled</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
      <option value="No-Show">No-Show</option>
    </select>
    <select id="filter-priority" onchange="filterTable()" style="max-width:140px">
      <option value="">All Priority</option>
      <option value="Normal">Normal</option>
      <option value="Urgent">Urgent</option>
      <option value="Emergency">Emergency</option>
    </select>
  </div>

  <div class="table-wrap">
    <div id="appt-table"><div class="spinner">Loading…</div></div>
  </div>
</main>


<!-- ── Book Appointment Modal ───────────────────────────────────────────── -->
<div class="modal-overlay" id="book-modal">
  <div class="modal">
    <div class="modal-title">Book Appointment</div>
    <div class="form-grid">
      <div class="form-group full" id="member-group">
        <label>Member *</label>
        <select id="f-member"><option value="">Loading…</option></select>
      </div>
      <div class="form-group full">
        <label>Doctor *</label>
        <div class="doctor-picker">
          <!-- Search input -->
          <div class="doctor-search-wrap">
            <input type="text" id="f-doctor-search"
                   placeholder="Search by name or specialization…"
                   oninput="filterDoctorList()"
                   autocomplete="off">
          </div>
          <!-- Scrollable doctor cards list -->
          <div class="doctor-list" id="f-doctor-list">
            <div class="doctor-list-empty">Loading doctors…</div>
          </div>
          <!-- Hidden value holder -->
          <input type="hidden" id="f-doctor">
          <!-- Selected doctor info card -->
          <div id="f-doctor-info" style="display:none; margin-top:8px;
            background:rgba(79,142,247,0.06); border:1px solid rgba(79,142,247,0.25);
            border-radius:var(--radius); padding:12px 14px; font-size:0.82rem;">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="f-date" onchange="onDoctorOrDateChange()">
      </div>
      <div class="form-group">
        <label>Time Slot *</label>
        <select id="f-time" disabled>
          <option value="">Select doctor and date first</option>
        </select>
        <small id="f-time-hint" style="color:var(--text3);font-size:0.78rem;margin-top:3px;display:block"></small>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="f-priority">
          <option value="Normal">Normal</option>
          <option value="Urgent">Urgent</option>
          <option value="Emergency">Emergency</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Symptoms</label>
        <textarea id="f-symptoms" rows="2" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('book-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="bookAppointment()">Book</button>
    </div>
  </div>
</div>


<!-- ── Status Update Modal ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="status-modal">
  <div class="modal" style="max-width:340px">
    <div class="modal-title">Update Status</div>
    <p style="color:var(--text2); font-size:0.85rem; margin-bottom:14px" id="status-appt-info"></p>
    <div class="form-group">
      <label>New Status</label>
      <select id="f-new-status">
        <option value="Scheduled">Scheduled</option>
        <option value="Completed">Completed</option>
        <option value="Cancelled">Cancelled</option>
        <option value="No-Show">No-Show</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('status-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateStatus()">Update</button>
    </div>
  </div>
</div>


<!-- ── Prescribe Modal (Doctors only) ──────────────────────────────────── -->
<div class="modal-overlay" id="prescribe-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-title">Issue Prescription</div>

    <!-- Appointment summary -->
    <div id="rx-appt-summary" style="
      background:var(--bg3); border:1px solid var(--border);
      border-radius:var(--radius); padding:12px 16px; margin-bottom:18px;
      font-size:0.85rem; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Chief Complaint *</label>
        <input type="text" id="rx-complaint" placeholder="e.g. Fever, Headache">
      </div>
      <div class="form-group">
        <label>Diagnosis *</label>
        <input type="text" id="rx-diagnosis" placeholder="e.g. Viral fever">
      </div>
      <div class="form-group">
        <label>Valid Until *</label>
        <input type="date" id="rx-valid">
      </div>
      <div class="form-group">
        <label>Visit Type</label>
        <select id="rx-visit-type">
          <option value="Scheduled">Scheduled</option>
          <option value="Walk-in">Walk-in</option>
          <option value="Emergency">Emergency</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Special Instructions</label>
        <input type="text" id="rx-instructions" placeholder="e.g. Take after meals, avoid alcohol">
      </div>
    </div>

    <!-- Medicine items -->
    <div class="section-title" style="margin-top:4px">Medicines</div>
    <div class="med-items-wrap" id="med-items-wrap">
      <!-- rows injected here -->
    </div>
    <button class="btn btn-ghost add-med-btn" onclick="addMedRow()">+ Add Medicine</button>

    <div class="modal-footer" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal('prescribe-modal')">Cancel</button>
      <button class="btn btn-success" onclick="submitPrescription()">Issue Prescription</button>
    </div>
  </div>
</div>


<!-- ── View Prescriptions Modal (Nurse / Pharmacist) ───────────────────── -->
<div class="modal-overlay" id="viewrx-modal">
  <div class="modal" style="max-width:600px">
    <div class="modal-title">Prescriptions for <span id="viewrx-member-name"></span></div>
    <div id="viewrx-body"><div class="spinner">Loading…</div></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('viewrx-modal')">Close</button>
    </div>
  </div>
</div>


<script src="js/api.js"></script>
<script>
  if (!requireAuth()) throw '';
  renderNav('appointments');

  const user       = getUser();
  const isDoctor   = hasRole('Doctor');
  const canViewRx  = hasRole('Nurse', 'Pharmacist', 'Admin', 'SuperAdmin');

  let allAppts     = [];
  let medicines    = [];   // cached medicine list for prescription form
  let allDoctorsList = []; // cached full doctor list for search filtering
  let editingID    = null;
  let rxAppt       = null; // appointment being prescribed for

  // ── Load medicines once for prescription form ───────────────────────────
  async function loadMedicines() {
    try {
      const data = await api.get('/medicines');
      medicines = (data.data || []).filter(m => m.Status === 'Available');
    } catch {}
  }

  // ── Load appointments ───────────────────────────────────────────────────
  async function loadAppointments() {
    try {
      const data = await api.get('/appointments');
      allAppts   = data.data || [];
      renderTable(allAppts);
    } catch (err) {
      document.getElementById('appt-table').innerHTML =
        `<p class="empty">Error: ${err.message}</p>`;
    }
  }

  // ── Badge helpers ───────────────────────────────────────────────────────
  function statusBadge(s) {
    const map = { Scheduled:'blue', Completed:'green', Cancelled:'gray', 'No-Show':'warn' };
    return `<span class="badge badge-${map[s]||'gray'}">${s}</span>`;
  }
  function priorityBadge(p) {
    const map = { Normal:'gray', Urgent:'warn', Emergency:'danger' };
    return `<span class="badge badge-${map[p]||'gray'}">${p}</span>`;
  }

  // ── Render table ────────────────────────────────────────────────────────
  function renderTable(rows) {
    const cols = [
      { key: 'AppointmentID',   label: 'ID' },
      { key: 'MemberName',      label: 'Member' },
      { key: 'DoctorName',      label: 'Doctor' },
      { key: 'AppointmentDate', label: 'Date' },
      { key: 'AppointmentTime', label: 'Time' },
      { key: 'Symptoms',        label: 'Symptoms' },
      { key: 'Priority',        label: 'Priority' },
      { key: 'Status',          label: 'Status' },
    ];

    buildTable('appt-table', cols, rows, row => {
      setTimeout(() => {
        document.querySelectorAll('#appt-table tbody tr').forEach((tr, i) => {
          if (!rows[i]) return;
          tr.cells[6].innerHTML = priorityBadge(rows[i].Priority);
          tr.cells[7].innerHTML = statusBadge(rows[i].Status);
          if (rows[i].AppointmentDate)
            tr.cells[3].textContent = rows[i].AppointmentDate.split('T')[0];
          // Truncate symptoms
          const sym = rows[i].Symptoms || '—';
          tr.cells[5].textContent = sym.length > 30 ? sym.slice(0,30)+'…' : sym;
        });
      }, 0);

      let btns = '';

      // Status update button — admin/doctor/nurse on scheduled appts
      if (row.Status === 'Scheduled' && (isAdmin() || isDoctor || hasRole('Nurse'))) {
        btns += `<button class="btn btn-ghost btn-sm"
          onclick="openStatusUpdate(${row.AppointmentID},'${row.Status}','Appt #${row.AppointmentID}')">
          Update</button>`;
      }

      // ── PRESCRIBE button — Doctors only, Scheduled appointments only ──
      if (isDoctor && row.Status === 'Scheduled') {
        btns += ` <button class="btn btn-success btn-sm"
          onclick="openPrescribe(${row.AppointmentID})">
          Prescribe</button>`;
      }

      // ── VIEW RX button — Nurses and Pharmacists (and Admin) ──
      if (canViewRx && !isDoctor) {
        btns += ` <button class="btn btn-ghost btn-sm"
          onclick="openViewRx(${row.MemberID || row.AppointmentID},'${(row.MemberName||'Member').replace(/'/g,"\\'")}',${row.AppointmentID})">
          View Rx</button>`;
      }

      // ── VIEW PRESCRIPTION button — Members only, Completed appointments ──
      if (isMember() && row.Status === 'Completed') {
        btns += ` <button class="btn btn-primary btn-sm"
          onclick="openMemberRx(${row.AppointmentID})">
          View Prescription</button>`;
      }

      // Delete — admin only
      if (isAdmin()) {
        btns += ` <button class="btn btn-danger btn-sm"
          onclick="deleteAppt(${row.AppointmentID})">Delete</button>`;
      }

      return btns;
    });
  }

  function filterTable() {
    const q      = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const pri    = document.getElementById('filter-priority').value;
    const filtered = allAppts.filter(a => {
      const matchQ = !q ||
        a.MemberName?.toLowerCase().includes(q) ||
        a.DoctorName?.toLowerCase().includes(q);
      return matchQ &&
        (!status || a.Status === status) &&
        (!pri    || a.Priority === pri);
    });
    renderTable(filtered);
  }


  // ── Book Appointment ────────────────────────────────────────────────────
  // ── Doctor search — simple filter on native select ──────────────────────

  function resetSlots() {
    document.getElementById('f-time').innerHTML = '<option value="">Select doctor and date first</option>';
    document.getElementById('f-time').disabled  = true;
    document.getElementById('f-time-hint').textContent = '';
  }

  function filterDoctorList() {
    const q = document.getElementById('f-doctor-search').value.toLowerCase().trim();
    const filtered = q
      ? allDoctorsList.filter(d =>
          d.Name?.toLowerCase().includes(q) ||
          d.Specialization?.toLowerCase().includes(q))
      : allDoctorsList;
    renderDoctorList(filtered);
    // Clear selection when search changes
    document.getElementById('f-doctor').value = '';
    document.getElementById('f-doctor-info').style.display = 'none';
    resetSlots();
  }

  function renderDoctorList(list) {
    const container = document.getElementById('f-doctor-list');
    const selectedID = document.getElementById('f-doctor').value;
    const colors = ['#4f8ef7','#38c98b','#f0a830','#e05c5c','#a78bfa','#fb923c'];

    if (!list.length) {
      container.innerHTML = '<div class="doctor-list-empty">No doctors found</div>';
      return;
    }

    container.innerHTML = list.map((d, i) => {
      const from = (d.AvailableFrom || '').substring(0,5);
      const to   = (d.AvailableTo   || '').substring(0,5);
      const color = colors[i % colors.length];
      return `
        <div class="doctor-list-item ${d.DoctorID == selectedID ? 'selected' : ''}"
             onclick="selectDoctorItem(${d.DoctorID})">
          <div class="dl-avatar" style="color:${color}">${d.Name.charAt(d.Name.indexOf(' ')+1) || d.Name.charAt(0)}</div>
          <div>
            <div class="dl-name">${d.Name}</div>
            <div class="dl-spec">${d.Specialization}</div>
          </div>
          <div class="dl-avail">
            <div class="dl-days">${d.WorkingDays || '—'}</div>
            <div class="dl-time">${from && to ? from + '–' + to : 'Varies'}</div>
          </div>
        </div>`;
    }).join('');
  }

  function selectDoctorItem(id) {
    document.getElementById('f-doctor').value = id;

    // Hide the list and search after selection
    document.getElementById('f-doctor-list').style.display   = 'none';
    document.getElementById('f-doctor-search').style.display = 'none';

    const doc = allDoctorsList.find(d => d.DoctorID == id);
    if (doc) {
      const from = (doc.AvailableFrom || '').substring(0,5);
      const to   = (doc.AvailableTo   || '').substring(0,5);
      const info = document.getElementById('f-doctor-info');
      info.style.display = 'block';
      info.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div>
            <div style="font-weight:600;color:var(--text)">${doc.Name}</div>
            <div style="color:var(--text2);font-size:0.8rem;margin-top:2px">${doc.Specialization}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="text-align:right">
              <div style="color:var(--accent2);font-weight:500;font-size:0.82rem">${doc.WorkingDays || 'See schedule'}</div>
              <div style="color:var(--text3);font-size:0.75rem;margin-top:1px">${from && to ? from + ' – ' + to : 'Hours vary by day'}</div>
            </div>
            <button onclick="clearDoctorSelection()" style="
              background:transparent;border:1px solid var(--border);
              color:var(--text2);border-radius:var(--radius);
              padding:4px 10px;cursor:pointer;font-size:0.78rem;
              font-family:var(--font);white-space:nowrap"
              title="Change doctor">Change</button>
          </div>
        </div>`;
    }
    onDoctorOrDateChange();
  }

  function clearDoctorSelection() {
    document.getElementById('f-doctor').value            = '';
    document.getElementById('f-doctor-info').style.display  = 'none';
    document.getElementById('f-doctor-list').style.display  = 'block';
    document.getElementById('f-doctor-search').style.display = 'block';
    document.getElementById('f-doctor-search').value     = '';
    renderDoctorList(allDoctorsList);
    resetSlots();
  }

  async function openBook() {
    try {
      const [members, doctors] = await Promise.all([
        api.get('/members'), api.get('/doctors')
      ]);

      const mSel = document.getElementById('f-member');
      const dSel = document.getElementById('f-doctor');

      if (isMember()) {
        document.getElementById('member-group').style.display = 'none';
      } else {
        document.getElementById('member-group').style.display = 'flex';
        mSel.innerHTML = '<option value="">Select member</option>' +
          (members.data || []).map(m =>
            `<option value="${m.MemberID}">${m.Name} (${m.RollNumberOrEmployeeCode || m.MemberID})</option>`
          ).join('');
      }

      allDoctorsList = (doctors.data || []).filter(d => d.Status === 'Active');

      // Reset doctor search field
      document.getElementById('f-doctor-search').value = '';
      document.getElementById('f-doctor-info').style.display = 'none';
      renderDoctorList(allDoctorsList); // repopulate list with all doctors

      ['f-date','f-symptoms'].forEach(id =>
        document.getElementById(id).value = '');
      document.getElementById('f-priority').value = 'Normal';
      resetSlots();

      openModal('book-modal');
    } catch (err) {
      toast('Failed to load data: ' + err.message, 'error');
    }
  }

  // Load available slots when doctor or date changes
  async function onDoctorOrDateChange() {
    const doctorID = document.getElementById('f-doctor').value;
    const date     = document.getElementById('f-date').value;
    const sel      = document.getElementById('f-time');
    const hint     = document.getElementById('f-time-hint');

    if (!doctorID || !date) {
      sel.innerHTML = '<option value="">Select doctor and date first</option>';
      sel.disabled  = true;
      hint.textContent = '';
      return;
    }

    sel.innerHTML = '<option value="">Loading slots…</option>';
    sel.disabled  = true;
    hint.textContent = '';

    try {
      const data = await api.get(`/appointments/slots?doctorID=${doctorID}&date=${date}`);

      if (!data || !data.slots) {
        sel.innerHTML = '<option value="">No slots available</option>';
        hint.textContent = data?.error || 'Doctor not available on this date';
        hint.style.color = 'var(--danger)';
        return;
      }

      const available = data.slots.filter(s => s.available);
      const booked    = data.slots.filter(s => !s.available);

      if (available.length === 0) {
        sel.innerHTML = '<option value="">All slots booked for this day</option>';
        hint.textContent = `All ${data.slots.length} slots are taken. Try another date.`;
        hint.style.color = 'var(--warn)';
        return;
      }

      sel.innerHTML =
        '<option value="">Select a time slot</option>' +
        available.map(s => `<option value="${s.time}:00">${s.time}</option>`).join('');
      sel.disabled = false;

      const from = data.availableFrom?.substring(0,5);
      const to   = data.availableTo?.substring(0,5);
      hint.style.color = 'var(--text3)';
      hint.textContent = `Available ${from}–${to} · ${available.length} of ${data.slots.length} slots free`;

    } catch (err) {
      sel.innerHTML = '<option value="">Error loading slots</option>';
      hint.textContent = err.message;
      hint.style.color = 'var(--danger)';
    }
  }

  async function bookAppointment() {
    const memberID = isMember()
      ? user.entityID
      : parseInt(document.getElementById('f-member').value);
    const body = {
      MemberID:        memberID,
      DoctorID:        parseInt(document.getElementById('f-doctor').value) || null,
      AppointmentDate: document.getElementById('f-date').value,
      AppointmentTime: document.getElementById('f-time').value,
      Priority:        document.getElementById('f-priority').value,
      Symptoms:        document.getElementById('f-symptoms').value.trim(),
    };

    if (!body.DoctorID)
      return toast('Please select a doctor', 'warn');
    if (!body.MemberID || !body.AppointmentDate || !body.AppointmentTime)
      return toast('Please fill all required fields', 'warn');

    try {
      await api.post('/appointments', body);
      toast('Appointment booked');
      closeModal('book-modal');
      loadAppointments();
    } catch (err) {
      toast(err.message, 'error');
    }
  }


  // ── Status Update ───────────────────────────────────────────────────────
  function openStatusUpdate(id, currentStatus, label) {
    editingID = id;
    document.getElementById('status-appt-info').textContent = label;

    const sel = document.getElementById('f-new-status');
    if (isMember() && !isAdmin()) {
      sel.innerHTML = '<option value="Cancelled">Cancelled</option>';
    } else {
      sel.innerHTML = `
        <option value="Scheduled">Scheduled</option>
        <option value="Completed">Completed</option>
        <option value="Cancelled">Cancelled</option>
        <option value="No-Show">No-Show</option>
      `;
      sel.value = currentStatus;
    }
    openModal('status-modal');
  }

  async function updateStatus() {
    try {
      await api.put(`/appointments/${editingID}`,
        { Status: document.getElementById('f-new-status').value });
      toast('Status updated');
      closeModal('status-modal');
      loadAppointments();
    } catch (err) {
      toast(err.message, 'error');
    }
  }


  // ── Delete ──────────────────────────────────────────────────────────────
  async function deleteAppt(id) {
    if (!confirm('Delete this appointment?')) return;
    try {
      await api.del(`/appointments/${id}`);
      toast('Appointment deleted');
      loadAppointments();
    } catch (err) {
      toast(err.message, 'error');
    }
  }


  // ════════════════════════════════════════════════════════════════════════
  // PRESCRIBE FLOW (Doctors only)
  // ════════════════════════════════════════════════════════════════════════

  async function openPrescribe(apptID) {
    // Find appointment from local cache
    rxAppt = allAppts.find(a => a.AppointmentID === apptID);
    if (!rxAppt) return toast('Appointment not found', 'error');

    // Fill appointment summary banner
    document.getElementById('rx-appt-summary').innerHTML = `
      <div>
        <div style="font-size:0.75rem;color:var(--text3)">Member</div>
        <div style="font-weight:500">${rxAppt.MemberName || 'Member #' + rxAppt.MemberID}</div>
      </div>
      <div>
        <div style="font-size:0.75rem;color:var(--text3)">Date</div>
        <div>${rxAppt.AppointmentDate?.split('T')[0]} at ${rxAppt.AppointmentTime}</div>
      </div>
      <div>
        <div style="font-size:0.75rem;color:var(--text3)">Symptoms</div>
        <div>${rxAppt.Symptoms || '—'}</div>
      </div>
    `;

    // Pre-fill fields
    document.getElementById('rx-complaint').value  = rxAppt.Symptoms || '';
    document.getElementById('rx-diagnosis').value  = '';
    document.getElementById('rx-instructions').value = '';

    // Default valid until = today + 10 days
    const validDate = new Date();
    validDate.setDate(validDate.getDate() + 10);
    document.getElementById('rx-valid').value =
      validDate.toISOString().split('T')[0];

    // Clear and add one default medicine row
    document.getElementById('med-items-wrap').innerHTML = '';
    addMedRow();

    openModal('prescribe-modal');
  }

  // Add a medicine row to the prescription form
  function addMedRow() {
    const wrap = document.getElementById('med-items-wrap');
    const idx  = wrap.children.length;

    const options = medicines.map(m =>
      `<option value="${m.MedicineID}">${m.Name}</option>`
    ).join('');

    const row = document.createElement('div');
    row.className = 'med-item';
    row.dataset.idx = idx;
    row.innerHTML = `
      <div>
        <label>Medicine *</label>
        <select class="med-name">${options || '<option value="">No medicines available</option>'}</select>
      </div>
      <div>
        <label>Dosage *</label>
        <input class="med-dosage" type="text" placeholder="e.g. 500mg">
      </div>
      <div>
        <label>Frequency *</label>
        <input class="med-freq" type="text" placeholder="e.g. Twice daily">
      </div>
      <div>
        <label>Duration *</label>
        <input class="med-dur" type="text" placeholder="e.g. 5 days">
      </div>
      <div>
        <label>Qty *</label>
        <input class="med-qty" type="number" min="1" value="1">
      </div>
      <button class="btn-remove-med" onclick="removeMedRow(this)" title="Remove">✕</button>
    `;
    wrap.appendChild(row);
  }

  function removeMedRow(btn) {
    const wrap = document.getElementById('med-items-wrap');
    if (wrap.children.length <= 1) {
      return toast('At least one medicine is required', 'warn');
    }
    btn.closest('.med-item').remove();
  }

  // Collect medicine rows into items array
  function collectMedItems() {
    const rows  = document.querySelectorAll('#med-items-wrap .med-item');
    const items = [];
    for (const row of rows) {
      const medicineID = parseInt(row.querySelector('.med-name').value);
      const dosage     = row.querySelector('.med-dosage').value.trim();
      const frequency  = row.querySelector('.med-freq').value.trim();
      const duration   = row.querySelector('.med-dur').value.trim();
      const quantity   = parseInt(row.querySelector('.med-qty').value);

      if (!medicineID || !dosage || !frequency || !duration || !quantity) {
        toast('Please fill all medicine fields', 'warn');
        return null;
      }
      items.push({ MedicineID: medicineID, Dosage: dosage, Frequency: frequency,
                   Duration: duration, Quantity: quantity });
    }
    return items;
  }

  async function submitPrescription() {
    const complaint    = document.getElementById('rx-complaint').value.trim();
    const diagnosis    = document.getElementById('rx-diagnosis').value.trim();
    const validUntil   = document.getElementById('rx-valid').value;
    const visitType    = document.getElementById('rx-visit-type').value;
    const instructions = document.getElementById('rx-instructions').value.trim();

    if (!complaint || !diagnosis || !validUntil)
      return toast('Please fill Chief Complaint, Diagnosis, and Valid Until', 'warn');

    const items = collectMedItems();
    if (!items) return; // validation failed inside collectMedItems

    const today     = new Date().toISOString().split('T')[0];
    const nowTime   = new Date().toTimeString().split(' ')[0];
    const doctorID  = user.entityID; // from JWT

    try {
      // Step 1 — Create Visit from this appointment
      const visitRes = await api.post('/visits', {
        MemberID:      rxAppt.MemberID,
        DoctorID:      doctorID,
        AppointmentID: rxAppt.AppointmentID,
        VisitDate:     today,
        VisitTime:     nowTime,
        ChiefComplaint: complaint,
        Diagnosis:     diagnosis,
        VisitType:     visitType,
        Status:        'Completed',
      });

      const visitID = visitRes.visitID;

      // Step 2 — Create Prescription linked to that Visit
      await api.post('/prescriptions', {
        VisitID:             visitID,
        MemberID:            rxAppt.MemberID,
        DoctorID:            doctorID,
        IssueDate:           today,
        ValidUntil:          validUntil,
        Diagnosis:           diagnosis,
        SpecialInstructions: instructions,
        items,
      });

      // Step 3 — Mark appointment as Completed
      await api.put(`/appointments/${rxAppt.AppointmentID}`, { Status: 'Completed' });

      toast('Prescription issued and appointment marked completed', 'success');
      closeModal('prescribe-modal');
      loadAppointments();

    } catch (err) {
      toast('Error: ' + err.message, 'error');
    }
  }


  // ════════════════════════════════════════════════════════════════════════
  // VIEW RX FLOW (Nurse / Pharmacist / Admin)
  // ════════════════════════════════════════════════════════════════════════

  async function openViewRx(memberID, memberName, apptID) {
    document.getElementById('viewrx-member-name').textContent = memberName;
    document.getElementById('viewrx-body').innerHTML =
      '<div class="spinner">Loading prescriptions…</div>';
    openModal('viewrx-modal');

    try {
      // Fetch all prescriptions — filtered server-side by role
      const data = await api.get('/prescriptions');
      const all  = data.data || [];

      // Filter to prescriptions for this member
      const memberPrescs = all.filter(p => p.MemberID === memberID || p.MemberName === memberName);

      if (memberPrescs.length === 0) {
        document.getElementById('viewrx-body').innerHTML =
          '<p class="empty">No prescriptions found for this member.</p>';
        return;
      }

      // Render each prescription with its items
      const html = await Promise.all(memberPrescs.map(async p => {
        let itemsHtml = '';
        try {
          const det  = await api.get(`/prescriptions/${p.PrescriptionID}`);
          const items = det.data.items || [];
          itemsHtml = items.length === 0
            ? '<p style="color:var(--text3);font-size:0.82rem;padding:8px 0">No items</p>'
            : `
              <div class="rx-item-row" style="font-weight:500;color:var(--text2)">
                <div>Medicine</div><div>Dosage</div><div>Frequency</div><div>Qty / Duration</div>
              </div>
              ${items.map(i => `
                <div class="rx-item-row">
                  <div>${i.MedicineName}</div>
                  <div>${i.Dosage}</div>
                  <div>${i.Frequency}</div>
                  <div>${i.Quantity} / ${i.Duration}</div>
                </div>`).join('')}`;
        } catch {}

        const badgeColor = { Active:'badge-green', Completed:'badge-blue', Cancelled:'badge-gray' };

        return `
          <div style="margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--border)">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
              <div>
                <span style="font-weight:600; font-size:0.9rem">Rx #${p.PrescriptionID}</span>
                &nbsp;
                <span class="badge ${badgeColor[p.Status]||'badge-gray'}">${p.Status}</span>
              </div>
              <div style="font-size:0.8rem; color:var(--text2)">
                Issued: ${p.IssueDate?.split('T')[0]}
                &nbsp;·&nbsp;
                Valid until: ${p.ValidUntil?.split('T')[0]}
              </div>
            </div>
            <div style="font-size:0.85rem; color:var(--text2); margin-bottom:8px">
              <strong>Doctor:</strong> ${p.DoctorName}
              &nbsp;·&nbsp;
              <strong>Diagnosis:</strong> ${p.Diagnosis}
            </div>
            ${itemsHtml}
          </div>`;
      }));

      document.getElementById('viewrx-body').innerHTML = html.join('');

    } catch (err) {
      document.getElementById('viewrx-body').innerHTML =
        `<p class="empty">Error loading prescriptions: ${err.message}</p>`;
    }
  }



  // ── VIEW PRESCRIPTION — Member sees medicines for their completed appointment ──
  async function openMemberRx(apptID) {
    document.getElementById('memberrx-body').innerHTML =
      '<div class="spinner">Loading…</div>';
    openModal('memberrx-modal');

    try {
      // Fetch member's own prescriptions (API filters to own records automatically)
      const data = await api.get('/prescriptions');
      const all  = (data.data || []);

      // Find prescriptions linked to visits from this appointment
      // Since visit is linked to appointmentID, fetch all and match
      if (all.length === 0) {
        document.getElementById('memberrx-body').innerHTML =
          '<p class="empty">No prescriptions found for this appointment.</p>';
        return;
      }

      // Get most recent prescription (last one issued) — members only see their own
      // Try to find one near this appointment date
      const appt = allAppts.find(a => a.AppointmentID === apptID);
      const apptDate = appt?.AppointmentDate?.split('T')[0];

      // Sort by closest to appointment date
      const sorted = [...all].sort((a, b) =>
        new Date(b.IssueDate) - new Date(a.IssueDate)
      );

      // Render all prescriptions with full medicine details
      const html = await Promise.all(sorted.map(async p => {
        let itemsHtml = '<div class="spinner" style="padding:12px">Loading medicines…</div>';
        try {
          const det   = await api.get(`/prescriptions/${p.PrescriptionID}`);
          const items = det.data.items || [];

          itemsHtml = items.length === 0
            ? '<p style="color:var(--text3);font-size:0.85rem;padding:8px 0">No medicines on this prescription.</p>'
            : `<table style="width:100%;border-collapse:collapse;font-size:0.85rem;margin-top:8px">
                <thead>
                  <tr style="background:var(--bg3)">
                    <th style="padding:8px 10px;text-align:left;color:var(--text2);font-size:0.78rem;border-bottom:1px solid var(--border)">Medicine</th>
                    <th style="padding:8px 10px;text-align:left;color:var(--text2);font-size:0.78rem;border-bottom:1px solid var(--border)">Dosage</th>
                    <th style="padding:8px 10px;text-align:left;color:var(--text2);font-size:0.78rem;border-bottom:1px solid var(--border)">Frequency</th>
                    <th style="padding:8px 10px;text-align:left;color:var(--text2);font-size:0.78rem;border-bottom:1px solid var(--border)">Duration</th>
                    <th style="padding:8px 10px;text-align:left;color:var(--text2);font-size:0.78rem;border-bottom:1px solid var(--border)">Qty</th>
                  </tr>
                </thead>
                <tbody>
                  ${items.map(i => `
                    <tr>
                      <td style="padding:10px;border-bottom:1px solid var(--border);font-weight:500">${i.MedicineName}</td>
                      <td style="padding:10px;border-bottom:1px solid var(--border)">${i.Dosage}</td>
                      <td style="padding:10px;border-bottom:1px solid var(--border)">${i.Frequency}</td>
                      <td style="padding:10px;border-bottom:1px solid var(--border)">${i.Duration}</td>
                      <td style="padding:10px;border-bottom:1px solid var(--border)">${i.Quantity}</td>
                    </tr>
                    ${i.Instructions ? `<tr>
                      <td colspan="5" style="padding:4px 10px 10px;border-bottom:1px solid var(--border);font-size:0.8rem;color:var(--text2)">
                        📋 ${i.Instructions}
                      </td>
                    </tr>` : ''}
                  `).join('')}
                </tbody>
              </table>`;
        } catch {}

        const badgeColor = { Active:'badge-green', Completed:'badge-blue', Cancelled:'badge-gray' };

        return `
          <div style="margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <div>
                <span style="font-weight:600">Dr. ${p.DoctorName}</span>
                &nbsp;
                <span class="badge ${badgeColor[p.Status]||'badge-gray'}">${p.Status}</span>
              </div>
              <div style="font-size:0.8rem;color:var(--text2)">
                Issued: ${p.IssueDate?.split('T')[0]}
                &nbsp;·&nbsp;Valid until: ${p.ValidUntil?.split('T')[0]}
              </div>
            </div>
            <div style="margin-bottom:8px;font-size:0.85rem">
              <span style="color:var(--text2)">Diagnosis:</span>
              <strong> ${p.Diagnosis}</strong>
            </div>
            ${p.SpecialInstructions ? `
            <div style="margin-bottom:10px;font-size:0.82rem;color:var(--text2);
              background:var(--bg3);border-radius:var(--radius);padding:8px 12px;
              border-left:3px solid var(--accent)">
              ℹ️ ${p.SpecialInstructions}
            </div>` : ''}
            ${itemsHtml}
          </div>`;
      }));

      document.getElementById('memberrx-body').innerHTML =
        html.join('') || '<p class="empty">No prescriptions found.</p>';

    } catch (err) {
      document.getElementById('memberrx-body').innerHTML =
        `<p class="empty">Error: ${err.message}</p>`;
    }
  }

  // ── Init ────────────────────────────────────────────────────────────────
  loadMedicines();
  loadAppointments();
</script>

<!-- Member View Prescription Modal -->
<div class="modal-overlay" id="memberrx-modal">
  <div class="modal" style="max-width:580px">
    <div class="modal-title">Your Prescription</div>
    <div id="memberrx-body"><div class="spinner">Loading…</div></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('memberrx-modal')">Close</button>
    </div>
  </div>
</div>
